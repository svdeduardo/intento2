<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menú - Masala Palace</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="CSS/style.css">
  <style>
    .card-menu {
        transition: transform 0.3s;
        cursor: pointer;
    }
    .card-menu:hover {
        transform: translateY(-5px);
        box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }
    .precio {
        color: #ff6b35;
        font-weight: bold;
        font-size: 1.2rem;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
  <div class="container">
    <a class="navbar-brand fw-bold fs-3" href="index.html">🪔 Masala Palace</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
        <li class="nav-item"><a class="nav-link active" href="menu.html">Menú</a></li>
        <li class="nav-item"><a class="nav-link" href="reservaciones.html">Reservar</a></li>
        <li class="nav-item"><a class="nav-link" href="contacto.html">Contacto</a></li>
        <li class="nav-item"><a class="nav-link btn btn-light text-dark ms-3" href="login.html" id="loginBtn">Iniciar Sesión</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-5 pt-5">
  <h1 class="text-center display-4 mb-5">Nuestro Menú</h1>

  <ul class="nav nav-pills justify-content-center mb-4" id="menuTabs">
    <li class="nav-item"><button class="nav-link active" data-categoria="entradas">🧆 Entradas</button></li>
    <li class="nav-item"><button class="nav-link" data-categoria="principales">🍛 Platos Principales</button></li>
    <li class="nav-item"><button class="nav-link" data-categoria="postres">🍮 Postres</button></li>
  </ul>

  <div id="menu-container" class="row">
    <div class="text-center">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Cargando...</span>
      </div>
    </div>
  </div>
</div>

<footer class="footer py-5 text-center mt-5">
  <p>&copy; 2026 Masala Palace</p>
</footer>

<script type="module">
  import { db } from './JS/firebase.js';
  import { collection, query, onSnapshot, orderBy } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
  import { auth } from './JS/firebase.js';
  
  const menuContainer = document.getElementById('menu-container');
  let currentCategoria = 'entradas';
  
  // Verificar sesión para mostrar botón de admin si es necesario
  onAuthStateChanged(auth, async (user) => {
    const loginBtn = document.getElementById('loginBtn');
    if (user) {
      const userDoc = await import('./JS/firebase.js').then(async ({ getDoc, doc }) => {
        const { db } = await import('./JS/firebase.js');
        return getDoc(doc(db, "users", user.uid));
      });
      
      if (userDoc.exists() && userDoc.data().role === 'admin') {
        loginBtn.innerHTML = '👑 Admin';
        loginBtn.href = 'dashboard.html';
      } else {
        loginBtn.innerHTML = 'Mi Perfil';
        loginBtn.href = 'reservaciones.html';
      }
    } else {
      loginBtn.innerHTML = 'Iniciar Sesión';
      loginBtn.href = 'login.html';
    }
  });
  
  // Función para cargar el menú
  function cargarMenu(categoria) {
    const q = query(
      collection(db, "menu"),
      orderBy("createdAt", "desc")
    );
    
    onSnapshot(q, (snapshot) => {
      const platillosFiltrados = [];
      snapshot.forEach((doc) => {
        const platillo = doc.data();
        if (platillo.categoria === categoria) {
          platillosFiltrados.push({ id: doc.id, ...platillo });
        }
      });
      
      if (platillosFiltrados.length === 0) {
        menuContainer.innerHTML = `
          <div class="col-12 text-center">
            <p>No hay platillos en esta categoría aún.</p>
          </div>
        `;
        return;
      }
      
      menuContainer.innerHTML = platillosFiltrados.map(platillo => `
        <div class="col-md-6 col-lg-4 mb-4">
          <div class="card card-menu h-100">
            <img src="${platillo.imagen}" class="card-img-top" alt="${platillo.nombre}" style="height: 200px; object-fit: cover;">
            <div class="card-body">
              <h5 class="card-title">${platillo.nombre}</h5>
              <p class="card-text text-muted">${platillo.descripcion}</p>
              <p class="precio">$${platillo.precio}</p>
            </div>
          </div>
        </div>
      `).join('');
    });
  }
  
  // Eventos para las pestañas
  document.querySelectorAll('[data-categoria]').forEach(tab => {
    tab.addEventListener('click', (e) => {
      document.querySelectorAll('[data-categoria]').forEach(t => t.classList.remove('active'));
      e.target.classList.add('active');
      currentCategoria = e.target.getAttribute('data-categoria');
      cargarMenu(currentCategoria);
    });
  });
  
  // Cargar menú inicial
  cargarMenu('entradas');
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
