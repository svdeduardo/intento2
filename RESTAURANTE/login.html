<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - Masala Palace</title>
  <link rel="stylesheet" href="CSS/hello.css">
</head>
<body>

<nav>
  <div style="display:flex; gap:1.5rem; padding: 1rem 2rem; align-items:center; flex-wrap:wrap;">
    <a href="index.html" style="font-weight:700; text-decoration:none;">🪔 Masala Palace</a>
    <a href="index.html">Inicio</a>
    <a href="menu.html">Menú</a>
    <a href="reservaciones.html">Reservar</a>
    <a href="contacto.html">Contacto</a>
  </div>
</nav>

<header>
  <h1>🪔 Masala Palace</h1>
</header>

<div id="status"></div>

<div id="auth-container">
  <div class="tabs">
    <button id="tab-login" class="active">Iniciar Sesión</button>
    <button id="tab-register">Registrarse</button>
  </div>

  <!-- Login -->
  <form id="login-form">
    <h2>Bienvenido de nuevo</h2>
    <input type="email"    id="login-email"    placeholder="Correo electrónico" required>
    <input type="password" id="login-password" placeholder="Contraseña"         required>
    <button type="submit">Entrar</button>
  </form>

  <!-- Registro -->
  <form id="register-form" style="display: none;">
    <h2>Crear cuenta</h2>
    <input type="text"     id="reg-nombre"   placeholder="Nombre completo"              required>
    <input type="email"    id="reg-email"    placeholder="Correo electrónico"            required>
    <input type="password" id="reg-password" placeholder="Contraseña (mín. 6 caracteres)" required>
    <button type="submit">Registrar</button>
  </form>

  <p id="auth-error" style="color:red; text-align:center;"></p>

  <div class="divider"><span>o</span></div>

  <div class="social-login">
    <button id="google-btn" class="social-btn google">
      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Google_%22G%22_logo.svg/2048px-Google_%22G%22_logo.svg.png" alt="Google">
      Continuar con Google
    </button>

    <button id="github-btn" class="social-btn github">
      <img src="https://upload.wikimedia.org/wikipedia/commons/9/91/Octicons-mark-github.svg" alt="GitHub">
      Continuar con GitHub
    </button>

    <button id="twitter-btn" class="social-btn twitter">
      <img src="https://upload.wikimedia.org/wikipedia/commons/6/60/Twitter_Logo_2021.svg" alt="X">
      Continuar con X
    </button>
  </div>
</div>

<script type="module" src="JS/firebase.js"></script>
<script type="module" src="JS/auth.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    initAuth();
  });
</script>
</body>
</html>
