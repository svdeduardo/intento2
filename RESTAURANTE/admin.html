<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Masala Palace</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="CSS/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
  <div class="container">
    <a class="navbar-brand fw-bold fs-3" href="index.html">🪔 Masala Palace</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
        <li class="nav-item"><a class="nav-link" href="menu.html">Menú</a></li>
        <li class="nav-item"><a class="nav-link" href="reservaciones.html">Reservar</a></li>
        <li class="nav-item"><a class="nav-link" href="contacto.html">Contacto</a></li>
        <li class="nav-item"><a class="nav-link btn btn-light text-dark ms-3" href="admin.html">Iniciar Sesion</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-5 pt-5">

  <!-- Login -->
  <div id="loginSection">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card">
          <div class="card-body">
            <h3 class="text-center">Acceso Personal</h3>
            <input type="email" id="email" class="form-control mb-3" placeholder="Correo">
            <input type="password" id="password" class="form-control mb-3" placeholder="Contraseña">
            <button onclick="login(document.getElementById('email').value, document.getElementById('password').value)" class="btn btn-primary w-100">Ingresar</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboardSection" class="d-none">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2>Panel de Administración</h2>
      <button onclick="logout()" class="btn btn-danger">Cerrar Sesión</button>
    </div>

    <h4>Mesas en Tiempo Real</h4>
    <div id="tablesGrid" class="row"></div>

    <h4 class="mt-5">Reservaciones del Día</h4>
    <div id="reservationsList" class="table-responsive"></div>
  </div>
</div>

<script type="module" src="JS/firebase.js"></script>
<script type="module" src="JS/auth.js"></script>
<script type="module" src="JS/tables.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById('loginSection').classList.add('d-none');
    document.getElementById('dashboardSection').classList.remove('d-none');
    loadTables();
  }
});
</script>
</body>
</html>
